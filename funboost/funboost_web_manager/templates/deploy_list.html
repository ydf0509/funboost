<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脚本部署</title>
    <link href="{{ url_for('static',filename='css_cdn/twitter-bootstrap/3.3.7/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static',filename='css_cdn/font-awesome/4.7.0/css/font-awesome.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static',filename='js/jquery-1.11.0.min.js') }}"></script>
    <script src="{{ url_for('static',filename='js_cdn/bootstrap/3.3.7/js/bootstrap.min.js') }}"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e0e0e0;
            margin: 0; padding: 0;
        }
        .main-container { padding: 20px 25px; max-width: 100%; }
        .page-header-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding: 18px 22px;
            background: linear-gradient(135deg, rgba(30,30,63,0.9) 0%, rgba(42,42,74,0.85) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2);
        }
        .page-header-bar h3 {
            margin: 0; color: #fff; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .page-header-bar h3 i { color: #a78bfa; }
        .btn-create {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none; color: #fff; padding: 8px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .3s ease;
        }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); color: #fff; }
        .info-bar { display: flex; gap: 15px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
        .info-badge {
            padding: 8px 16px; border-radius: 10px; font-size: 13px;
            background: rgba(30,30,63,0.8); border: 1px solid rgba(99,102,241,0.15);
        }
        .info-badge i { margin-right: 6px; color: #a78bfa; }
        .refresh-ctrl {
            margin-left: auto; display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 10px; font-size: 13px;
            background: rgba(30,30,63,0.8); border: 1px solid rgba(99,102,241,0.15);
        }
        .refresh-ctrl select {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 6px; padding: 2px 8px; font-size: 12px;
        }
        .refresh-ctrl select:focus { border-color: #6366f1; outline: none; }

        .deploy-table-wrap {
            background: linear-gradient(135deg, rgba(30,30,63,0.85) 0%, rgba(42,42,74,0.8) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2); overflow: hidden;
        }
        .deploy-table { width: 100%; border-collapse: collapse; }
        .deploy-table thead th {
            background: rgba(99,102,241,0.12); color: #a78bfa;
            padding: 12px 16px; font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .deploy-table tbody tr { border-bottom: 1px solid rgba(99,102,241,0.08); transition: background .2s ease; }
        .deploy-table tbody tr:hover { background: rgba(99,102,241,0.06); }
        .deploy-table td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }

        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-running { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.5); }
        .status-stopped { background: #6b7280; }

        .btn-action {
            padding: 5px 12px; border-radius: 6px; font-size: 12px;
            border: none; cursor: pointer; margin-right: 4px; transition: all .2s ease; font-weight: 500;
        }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-detail { background: rgba(99,102,241,0.2); color: #a78bfa; }
        .btn-detail:hover { background: rgba(99,102,241,0.4); color: #fff; }
        .btn-start-sm { background: rgba(16,185,129,0.2); color: #34d399; }
        .btn-start-sm:hover { background: rgba(16,185,129,0.4); color: #fff; }
        .btn-stop-sm { background: rgba(239,68,68,0.2); color: #f87171; }
        .btn-stop-sm:hover { background: rgba(239,68,68,0.4); color: #fff; }
        .btn-clone-sm { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .btn-clone-sm:hover { background: rgba(59,130,246,0.4); color: #fff; }
        .btn-restart-sm { background: rgba(217,119,6,0.2); color: #fbbf24; }
        .btn-restart-sm:hover { background: rgba(217,119,6,0.4); color: #fff; }
        .btn-update-restart { background: rgba(139,92,246,0.2); color: #c4b5fd; }
        .btn-update-restart:hover { background: rgba(139,92,246,0.4); color: #fff; }
        .btn-del { background: rgba(239,68,68,0.15); color: #f87171; }
        .btn-del:hover:not(:disabled) { background: rgba(239,68,68,0.35); color: #fff; }

        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; color: rgba(99,102,241,0.3); }

        .action-toast {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
            color: #fff; display: none;
        }
        .toast-success { background: linear-gradient(135deg, #059669 0%, #34d399 100%); }
        .toast-error { background: linear-gradient(135deg, #dc2626 0%, #f87171 100%); }

        .modal-content {
            background: linear-gradient(135deg, #1e1e3f 0%, #2a2a4a 100%);
            border: 1px solid rgba(99,102,241,0.3); border-radius: 16px; color: #e0e0e0;
        }
        .modal-header { border-bottom: 1px solid rgba(99,102,241,0.2); padding: 20px; }
        .modal-title { color: #fff; font-weight: 600; }
        .modal-body { padding: 25px 20px; }
        .modal-footer { border-top: 1px solid rgba(99,102,241,0.2); padding: 15px 20px; }
        .close { color: #a78bfa; opacity: 1; font-size: 24px; }
        .close:hover { color: #fff; }
        .modal-footer .btn-default { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .modal-footer .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border: none; color: #fff; }
        .modal-footer .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); border: none; color: #fff; }
        .form-group label { color: #a78bfa; font-weight: 600; font-size: 13px; }
        .form-control {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 8px 12px;
        }
        .form-control:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); background: rgba(15,12,41,0.8); color: #fff; }

        .env-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .env-row input { flex: 1; }
        .btn-env-remove { background: rgba(239,68,68,0.2); color: #f87171; border: none; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-env-add { background: rgba(16,185,129,0.2); color: #34d399; border: none; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px; }

        .cmd-detail-box {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(99,102,241,0.2);
            border-radius: 8px; padding: 12px; margin-top: 10px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; color: #a78bfa;
            max-height: 500px; overflow-y: auto;
        }

        .ur-line { padding: 2px 0; font-size: 13px; line-height: 1.6; }
        .ur-step { color: #a78bfa; font-weight: 700; margin-top: 10px; margin-bottom: 4px; border-bottom: 1px solid rgba(99,102,241,0.2); padding-bottom: 4px; }
        .ur-step:first-child { margin-top: 0; }
        .ur-cmd { color: #60a5fa; }
        .ur-loading { color: rgba(255,255,255,0.5); padding: 4px 0; }
        .ur-success { color: #34d399; white-space: pre-wrap; }
        .ur-error { color: #f87171; white-space: pre-wrap; }
        .ur-ok { color: #34d399; font-weight: 600; margin-top: 6px; padding: 4px 8px; background: rgba(52,211,153,0.1); border-radius: 4px; }
        .ur-fail { color: #f87171; font-weight: 600; margin-top: 6px; padding: 4px 8px; background: rgba(248,113,113,0.1); border-radius: 4px; }
        .ur-info { color: #e0e0e0; }
        .ur-log  { color: #94a3b8; font-size: 11.5px; }
        .ur-warn { color: #fbbf24; font-size: 11.5px; }
        .ur-critical { color: #dc2626; font-weight: 600; font-size: 11.5px; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="page-header-bar">
        <h3><i class="fa fa-cloud-upload"></i> 脚本部署管理</h3>
        <button class="btn-create" onclick="showCreateModal()"><i class="fa fa-plus"></i> 新建部署</button>
    </div>
    <div class="info-bar">
        <span class="info-badge"><i class="fa fa-server"></i>本机 IP: <strong id="localIp">-</strong></span>
        <span class="info-badge"><i class="fa fa-list"></i>部署数: <strong id="deployCount">0</strong></span>
        <span class="info-badge"><i class="fa fa-check-circle"></i>运行中: <strong id="runningCount" style="color:#34d399">0</strong></span>
        <span class="refresh-ctrl">
            <i class="fa fa-refresh" style="color:#a78bfa;"></i>
            <span>自动刷新:</span>
            <select id="listRefreshInterval" onchange="updateListRefreshInterval()">
                <option value="0">关闭</option>
                <option value="5" selected>5秒</option>
                <option value="10">10秒</option>
                <option value="30">30秒</option>
                <option value="60">60秒</option>
            </select>
        </span>
    </div>
    <div class="deploy-table-wrap">
        <table class="deploy-table">
            <thead><tr><th>部署名称</th><th>项目路径</th><th>启动命令</th><th>状态</th><th>启动时间</th><th>PID</th><th>操作</th></tr></thead>
            <tbody id="deployTableBody"><tr><td colspan="7" class="empty-state"><i class="fa fa-inbox"></i>加载中...</td></tr></tbody>
        </table>
    </div>
</div>

<div class="action-toast" id="actionToast"></div>

<!-- 新建部署模态框 -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title" id="createModalTitle"><i class="fa fa-plus-circle" style="color:#6366f1;margin-right:8px;"></i>新建部署</h4>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editMode" value="create">
            <div class="form-group"><label>部署名称</label><input type="text" class="form-control" id="inputName" placeholder="唯一标识"></div>
            <div class="form-group"><label>项目根目录</label><input type="text" class="form-control" id="inputProjectDir" placeholder="本地绝对路径"></div>
            <div class="form-group"><label>启动命令</label><input type="text" class="form-control" id="inputStartCmd" placeholder="例如 python main.py"></div>
            <div class="form-group"><label>环境变量</label><div id="envVarsContainer"></div>
                <button class="btn-env-add" onclick="addEnvRow()"><i class="fa fa-plus"></i> 添加环境变量</button>
            </div>
            <hr style="border-color:rgba(99,102,241,0.15);margin:15px 0;">
            <div style="font-size:13px;color:#a78bfa;font-weight:600;margin-bottom:10px;">高级设置</div>
            <div style="display:flex;gap:15px;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#e0e0e0;">
                    <input type="checkbox" id="inputAutoStart"> 自动启动 (服务启动时)
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#e0e0e0;">
                    <input type="checkbox" id="inputAutoRestart"> 自动重启 (崩溃后)
                </label>
            </div>
            <div style="display:flex;gap:15px;margin-top:10px;flex-wrap:wrap;">
                <div class="form-group" style="flex:1;min-width:120px;margin-bottom:0;">
                    <label>最大连续重试次数</label>
                    <input type="number" class="form-control" id="inputMaxRetry" value="3" min="1" max="100">
                </div>
                <div class="form-group" style="flex:1;min-width:120px;margin-bottom:0;">
                    <label>存活检查秒数</label>
                    <input type="number" class="form-control" id="inputHealthSecs" value="10" min="1" max="300">
                </div>
                <div class="form-group" style="flex:1;min-width:120px;margin-bottom:0;">
                    <label>进程数量</label>
                    <input type="number" class="form-control" id="inputNumProcesses" value="1" min="1" max="100">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary" onclick="saveDeploy()">保存</button>
        </div>
    </div></div>
</div>

<!-- 复制部署模态框 -->
<div class="modal fade" id="cloneModal" tabindex="-1">
    <div class="modal-dialog modal-sm"><div class="modal-content">
        <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title"><i class="fa fa-copy" style="color:#60a5fa;margin-right:8px;"></i>复制部署</h4>
        </div>
        <div class="modal-body">
            <p>从 <strong id="cloneSourceName"></strong> 复制配置</p>
            <div class="form-group"><label>新部署名称</label><input type="text" class="form-control" id="cloneNewName" placeholder="输入新名称"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary" onclick="confirmClone()">确认复制</button>
        </div>
    </div></div>
</div>

<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm"><div class="modal-content">
        <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title"><i class="fa fa-exclamation-triangle" style="color:#ef4444;margin-right:8px;"></i>确认删除</h4>
        </div>
        <div class="modal-body">确定要删除部署 <strong id="deleteTargetName"></strong> 吗？</div>
        <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
            <button type="button" class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
        </div>
    </div></div>
</div>

<!-- 命令详情模态框 -->
<div class="modal fade" id="cmdModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            <h4 class="modal-title" id="cmdModalTitle"><i class="fa fa-terminal" style="color:#a78bfa;margin-right:8px;"></i>执行详情</h4>
        </div>
        <div class="modal-body"><div class="cmd-detail-box" id="cmdDetailContent"></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-default" data-dismiss="modal">关闭</button></div>
    </div></div>
</div>

<script>
var refreshTimer = null;
var deleteTarget = '';
var cloneSource = '';

function showToast(msg, ok) {
    var $t = $('#actionToast');
    $t.stop(true).text(msg).removeClass('toast-success toast-error')
      .addClass(ok ? 'toast-success' : 'toast-error').css('display','block');
    setTimeout(function(){ $t.fadeOut(); }, 3000);
}

function showCmdDetail(title, detail) {
    var lines = [];
    if (detail.cwd) lines.push('工作目录: ' + detail.cwd);
    if (detail.env_vars && detail.env_vars.length) lines.push('环境变量:\n  ' + detail.env_vars.join('\n  '));
    if (detail.full_cmd) lines.push('启动命令: ' + detail.full_cmd);
    if (detail.log_file) lines.push('日志文件: ' + detail.log_file);
    if (detail.stop_cmd) lines.push('停止命令: ' + detail.stop_cmd);
    if (detail.old_pid) lines.push('旧 PID: ' + detail.old_pid);
    if (detail.pid) lines.push('PID: ' + detail.pid);
    $('#cmdModalTitle').html('<i class="fa fa-terminal" style="color:#a78bfa;margin-right:8px;"></i>' + title);
    $('#cmdDetailContent').text(lines.join('\n'));
    $('#cmdModal').modal('show');
}

function loadDeployList() {
    $.get('/deploy/list', function(resp) {
        if (!resp.succ) return;
        $('#localIp').text(resp.ip);
        var list = resp.data;
        $('#deployCount').text(list.length);
        var runCount = 0;
        list.forEach(function(d) { if (d.running) runCount++; });
        $('#runningCount').text(runCount);

        if (list.length === 0) {
            $('#deployTableBody').html('<tr><td colspan="7" class="empty-state"><i class="fa fa-inbox"></i>暂无部署</td></tr>');
            return;
        }

        var html = '';
        list.forEach(function(d) {
            var statusHtml = d.running
                ? '<span class="status-dot status-running"></span>运行中'
                : '<span class="status-dot status-stopped"></span>已停止';
            var a = '<button class="btn-action btn-detail" onclick="goDetail(\'' + d.name + '\')"><i class="fa fa-eye"></i> 详情</button>';
            if (d.running) {
                a += '<button class="btn-action btn-stop-sm" onclick="quickStop(\'' + d.name + '\')"><i class="fa fa-stop"></i> 停止</button>';
            } else {
                a += '<button class="btn-action btn-start-sm" onclick="quickStart(\'' + d.name + '\')"><i class="fa fa-play"></i> 启动</button>';
            }
            a += '<button class="btn-action btn-restart-sm" onclick="quickRestart(\'' + d.name + '\')"><i class="fa fa-refresh"></i> 重启</button>';
            a += '<button class="btn-action btn-update-restart" onclick="quickUpdateRestart(\'' + d.name + '\')"><i class="fa fa-cloud-download"></i> 更新重启</button>';
            a += '<button class="btn-action btn-clone-sm" onclick="showCloneModal(\'' + d.name + '\')"><i class="fa fa-copy"></i> 复制</button>';
            if (d.running) {
                a += '<button class="btn-action btn-del" disabled title="请先停止再删除"><i class="fa fa-trash"></i></button>';
            } else {
                a += '<button class="btn-action btn-del" onclick="showDeleteModal(\'' + d.name + '\')"><i class="fa fa-trash"></i></button>';
            }

            html += '<tr>' +
                '<td><strong>' + d.name + '</strong></td>' +
                '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (d.project_dir||'') + '">' + (d.project_dir||'-') + '</td>' +
                '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (d.start_cmd||'') + '">' + (d.start_cmd||'-') + '</td>' +
                '<td>' + statusHtml + '</td>' +
                '<td>' + (d.start_time||'-') + '</td>' +
                '<td>' + (d.pid||'-') + '</td>' +
                '<td style="white-space:nowrap;">' + a + '</td></tr>';
        });
        $('#deployTableBody').html(html);
    });
}

function goDetail(name) {
    var detailUrl = '/tpl/deploy_detail.html?name=' + encodeURIComponent(name);
    if (window.parent && window.parent.navigateTo) {
        window.parent.navigateTo(detailUrl);
    } else {
        window.location.href = detailUrl;
    }
}
function showCreateModal() {
    $('#editMode').val('create');
    $('#createModalTitle').html('<i class="fa fa-plus-circle" style="color:#6366f1;margin-right:8px;"></i>新建部署');
    $('#inputName').val('').prop('disabled', false);
    $('#inputProjectDir').val(''); $('#inputStartCmd').val('');
    $('#envVarsContainer').empty();
    $('#inputAutoStart').prop('checked', false);
    $('#inputAutoRestart').prop('checked', false);
    $('#inputMaxRetry').val(3);
    $('#inputHealthSecs').val(10);
    $('#inputNumProcesses').val(1);
    $('#createModal').modal('show');
}
function addEnvRow(key, val) {
    $('#envVarsContainer').append('<div class="env-row"><input type="text" class="form-control env-key" placeholder="KEY" value="' + (key||'') + '"><input type="text" class="form-control env-val" placeholder="VALUE" value="' + (val||'') + '"><button class="btn-env-remove" onclick="$(this).parent().remove()"><i class="fa fa-times"></i></button></div>');
}
function collectEnvVars() {
    var env = {};
    $('#envVarsContainer .env-row').each(function() { var k=$(this).find('.env-key').val().trim(), v=$(this).find('.env-val').val().trim(); if(k) env[k]=v; });
    return env;
}
function saveDeploy() {
    var name = $('#inputName').val().trim();
    if (!name) { showToast('部署名称不能为空', false); return; }
    if (!/^[a-zA-Z0-9_-]+$/.test(name)) { showToast('部署名称只能包含字母、数字、下划线和连字符，不能有空格等特殊符号', false); return; }
    $.ajax({ url: '/deploy/save', method: 'POST', contentType: 'application/json',
        data: JSON.stringify({
            name: name,
            project_dir: $('#inputProjectDir').val().trim(),
            start_cmd: $('#inputStartCmd').val().trim(),
            env_vars: collectEnvVars(),
            auto_start: $('#inputAutoStart').is(':checked'),
            auto_restart: $('#inputAutoRestart').is(':checked'),
            max_retry: parseInt($('#inputMaxRetry').val()) || 3,
            health_check_secs: parseInt($('#inputHealthSecs').val()) || 10,
            num_processes: parseInt($('#inputNumProcesses').val()) || 1
        }),

    });
}

                if (d.old_start_time) urLog($c, '旧启动时间: ' + d.old_start_time, 'info');
                if (d.stop_cmd) urLog($c, '停止命令: ' + d.stop_cmd, 'cmd');

function appendLogTail($c, name) {
    urLog($c, '── 近期日志（最新200行）──', 'step');
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>加载日志中...', 'loading');
    $.get('/deploy/' + encodeURIComponent(name) + '/logs', { lines: 200 }, function(resp) {
        $c.find('.ur-loading:last').remove();
        if (!resp.succ || !resp.data || resp.data.length === 0) {
            urLog($c, '（暂无日志）', 'info');
            return;
        }
        var lines = resp.data;
        var lastCls = 'ur-info';
        for (var i = 0; i < lines.length; i++) {
            var raw = lines[i];
            if (!raw.trim()) continue;
            var hasTs = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/.test(raw);
            var cls;
            if (hasTs) {
                if (/- CRITICAL -/.test(raw))      cls = 'ur-critical';
                else if (/- ERROR -/.test(raw) || /\bTraceback\b/.test(raw)) cls = 'ur-error';
                else if (/- WARNING -/.test(raw))  cls = 'ur-warn';
                else                               cls = 'ur-log';
                lastCls = cls;
            } else {
                cls = lastCls;
            }
            $c.append($('<div>').addClass('ur-line ' + cls).text(raw));
        }
        $c[0].scrollTop = $c[0].scrollHeight;
    });
}

function urLog($el, text, type) {
    var cls = 'ur-line';
    switch(type) {
        case 'step': cls += ' ur-step'; break;
        case 'cmd': cls += ' ur-cmd'; break;
        case 'loading': cls += ' ur-loading'; break;
        case 'success': cls += ' ur-success'; break;
        case 'error': cls += ' ur-error'; break;
        case 'ok': cls += ' ur-ok'; break;
        case 'fail': cls += ' ur-fail'; break;
        case 'info': cls += ' ur-info'; break;
    }
    var $div = $('<div>').addClass(cls);
    if (type === 'loading') { $div.html(text); } else { $div.text(text); }
    $el.append($div);
    $el[0].scrollTop = $el[0].scrollHeight;
}

function quickUpdateRestart(name) {
    $('#cmdModalTitle').html('<i class="fa fa-cloud-download" style="color:#fbbf24;margin-right:8px;"></i>更新并重启 - ' + name);
    var $c = $('#cmdDetailContent').html('');
    $('#cmdModal').modal('show');

    urLog($c, '步骤 1/2: 执行 Git Pull', 'step');
    urLog($c, '$ git pull', 'cmd');
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在拉取代码...', 'loading');

    $.ajax({
        url: '/deploy/' + encodeURIComponent(name) + '/git_pull',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({}),
        success: function(resp) {
            $c.find('.ur-loading:last').remove();
            var output = (resp.output || resp.msg || '').trim();
            if (output) urLog($c, output, resp.succ ? 'success' : 'error');

            if (!resp.succ) {
                urLog($c, '\u2717 Git Pull 失败，已取消重启', 'fail');
                return;
            }
            urLog($c, '\u2713 Git Pull 成功', 'ok');

            urLog($c, '步骤 2/2: 重启进程', 'step');
            urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在停止旧进程并启动新进程，等待存活验证...', 'loading');

            $.ajax({
                url: '/deploy/' + encodeURIComponent(name) + '/restart',
                method: 'POST',
                timeout: 120000,
                success: function(resp2) {
                    $c.find('.ur-loading:last').remove();
                    if (resp2.cmd_detail) {
                        var d = resp2.cmd_detail;
                        if (d.old_pid) urLog($c, '旧 PID: ' + d.old_pid, 'info');
                        if (d.stop_cmd) urLog($c, '停止命令: ' + d.stop_cmd, 'cmd');
                        if (d.cwd) urLog($c, '工作目录: ' + d.cwd, 'info');
                        if (d.env_vars && d.env_vars.length) {
                            urLog($c, '环境变量:', 'info');
                            d.env_vars.forEach(function(v) { urLog($c, '  ' + v, 'info'); });
                        }
                        if (d.full_cmd) urLog($c, '启动命令: ' + d.full_cmd, 'cmd');
                        if (d.log_file) urLog($c, '日志文件: ' + d.log_file, 'info');
                        if (d.start_time) urLog($c, '启动时间: ' + d.start_time, 'info');
                        if (d.pid) urLog($c, '新 PID: ' + d.pid, 'info');
                        if (d.survived_secs != null && d.survived_secs >= 0) urLog($c, '存活验证: 稳定运行 ' + d.survived_secs + ' 秒 ✓', 'info');
                    }
                    if (!resp2.succ && resp2.msg) urLog($c, resp2.msg, 'error');
                    urLog($c, resp2.succ ? ('\u2713 ' + resp2.msg) : ('\u2717 启动失败'), resp2.succ ? 'ok' : 'fail');
                    appendLogTail($c, name);
                    setTimeout(loadDeployList, 2000);
                }
            });
        },
        error: function() {
            $c.find('.ur-loading:last').remove();
            urLog($c, '网络请求失败', 'error');
            urLog($c, '\u2717 操作中断', 'fail');
        }
    });
}

function confirmClone() {
    var newName = $('#cloneNewName').val().trim();
    if (!newName) { showToast('名称不能为空', false); return; }
    if (!/^[a-zA-Z0-9_-]+$/.test(newName)) { showToast('部署名称只能包含字母、数字、下划线和连字符，不能有空格等特殊符号', false); return; }
    $.ajax({ url: '/deploy/' + encodeURIComponent(cloneSource) + '/clone', method: 'POST', contentType: 'application/json',
        data: JSON.stringify({ new_name: newName }),
        success: function(resp) { $('#cloneModal').modal('hide'); showToast(resp.msg, resp.succ); if(resp.succ) loadDeployList(); }
    });
}

function updateListRefreshInterval() {
    clearInterval(refreshTimer);
    var sec = parseInt($('#listRefreshInterval').val()) || 0;
    if (sec > 0) {
        refreshTimer = setInterval(loadDeployList, sec * 1000);
    }
}

$(document).ready(function() {
    loadDeployList();
    updateListRefreshInterval();
});
