<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脚本部署</title>
    <link href="{{ url_for('static',filename='css_cdn/twitter-bootstrap/3.3.7/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static',filename='css_cdn/font-awesome/4.7.0/css/font-awesome.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static',filename='js/jquery-1.11.0.min.js') }}"></script>
    <script src="{{ url_for('static',filename='js_cdn/bootstrap/3.3.7/js/bootstrap.min.js') }}"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e0e0e0;
            margin: 0; padding: 0;
        }
        .main-container { padding: 20px 25px; max-width: 100%; }
        .page-header-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding: 18px 22px;
            background: linear-gradient(135deg, rgba(30,30,63,0.9) 0%, rgba(42,42,74,0.85) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2);
        }
        .page-header-bar h3 {
            margin: 0; color: #fff; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .page-header-bar h3 i { color: #a78bfa; }
        .btn-create {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none; color: #fff; padding: 8px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .3s ease;
        }
        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
            color: #fff;
        }
        .info-bar {
            display: flex; gap: 15px; margin-bottom: 18px; flex-wrap: wrap;
        }
        .info-badge {
            padding: 8px 16px; border-radius: 10px; font-size: 13px;
            background: rgba(30,30,63,0.8); border: 1px solid rgba(99,102,241,0.15);
        }
        .info-badge i { margin-right: 6px; color: #a78bfa; }

        /* 表格 */
        .deploy-table-wrap {
            background: linear-gradient(135deg, rgba(30,30,63,0.85) 0%, rgba(42,42,74,0.8) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2);
            overflow: hidden;
        }
        .deploy-table { width: 100%; border-collapse: collapse; }
        .deploy-table thead th {
            background: rgba(99,102,241,0.12); color: #a78bfa;
            padding: 12px 16px; font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .deploy-table tbody tr {
            border-bottom: 1px solid rgba(99,102,241,0.08);
            transition: background .2s ease;
        }
        .deploy-table tbody tr:hover { background: rgba(99,102,241,0.06); }
        .deploy-table td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }

        .status-dot {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; margin-right: 6px;
        }
        .status-running { background: #34d399; box-shadow: 0 0 8px rgba(52,211,153,0.5); }
        .status-stopped { background: #6b7280; }

        .btn-action {
            padding: 5px 12px; border-radius: 6px; font-size: 12px;
            border: none; cursor: pointer; margin-right: 4px;
            transition: all .2s ease; font-weight: 500;
        }
        .btn-detail { background: rgba(99,102,241,0.2); color: #a78bfa; }
        .btn-detail:hover { background: rgba(99,102,241,0.4); color: #fff; }
        .btn-start-sm { background: rgba(16,185,129,0.2); color: #34d399; }
        .btn-start-sm:hover { background: rgba(16,185,129,0.4); color: #fff; }
        .btn-stop-sm { background: rgba(239,68,68,0.2); color: #f87171; }
        .btn-stop-sm:hover { background: rgba(239,68,68,0.4); color: #fff; }
        .btn-del { background: rgba(239,68,68,0.15); color: #f87171; }
        .btn-del:hover { background: rgba(239,68,68,0.35); color: #fff; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4);
        }
        .empty-state i { font-size: 48px; margin-bottom: 15px; display: block; color: rgba(99,102,241,0.3); }

        /* 模态框 */
        .modal-content {
            background: linear-gradient(135deg, #1e1e3f 0%, #2a2a4a 100%);
            border: 1px solid rgba(99,102,241,0.3); border-radius: 16px; color: #e0e0e0;
        }
        .modal-header { border-bottom: 1px solid rgba(99,102,241,0.2); padding: 20px; }
        .modal-title { color: #fff; font-weight: 600; }
        .modal-body { padding: 25px 20px; }
        .modal-footer { border-top: 1px solid rgba(99,102,241,0.2); padding: 15px 20px; }
        .close { color: #a78bfa; opacity: 1; font-size: 24px; }
        .close:hover { color: #fff; }
        .modal-footer .btn-default {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
        }
        .modal-footer .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border: none; color: #fff;
        }
        .modal-footer .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); border: none; color: #fff;
        }
        .form-group label { color: #a78bfa; font-weight: 600; font-size: 13px; }
        .form-control {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 8px 12px;
        }
        .form-control:focus {
            border-color: #6366f1; outline: none;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
            background: rgba(15,12,41,0.8); color: #fff;
        }

        /* 环境变量 */
        .env-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .env-row input { flex: 1; }
        .btn-env-remove {
            background: rgba(239,68,68,0.2); color: #f87171; border: none;
            border-radius: 6px; width: 30px; height: 30px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-env-add {
            background: rgba(16,185,129,0.2); color: #34d399; border: none;
            border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="page-header-bar">
        <h3><i class="fa fa-cloud-upload"></i> 脚本部署管理</h3>
        <button class="btn-create" onclick="showCreateModal()"><i class="fa fa-plus"></i> 新建部署</button>
    </div>

    <div class="info-bar">
        <span class="info-badge"><i class="fa fa-server"></i>本机 IP: <strong id="localIp">-</strong></span>
        <span class="info-badge"><i class="fa fa-list"></i>部署数: <strong id="deployCount">0</strong></span>
        <span class="info-badge"><i class="fa fa-check-circle"></i>运行中: <strong id="runningCount" style="color:#34d399">0</strong></span>
    </div>

    <div class="deploy-table-wrap">
        <table class="deploy-table">
            <thead>
                <tr>
                    <th>部署名称</th>
                    <th>项目路径</th>
                    <th>启动命令</th>
                    <th>状态</th>
                    <th>启动时间</th>
                    <th>PID</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="deployTableBody">
                <tr><td colspan="7" class="empty-state"><i class="fa fa-inbox"></i>加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新建/编辑部署模态框 -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title" id="createModalTitle"><i class="fa fa-plus-circle" style="color:#6366f1;margin-right:8px;"></i>新建部署</h4>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editMode" value="create">
                <div class="form-group">
                    <label>部署名称</label>
                    <input type="text" class="form-control" id="inputName" placeholder="唯一标识，例如 my_spider">
                </div>
                <div class="form-group">
                    <label>项目根目录</label>
                    <input type="text" class="form-control" id="inputProjectDir" placeholder="本地绝对路径，例如 D:\projects\my_spider">
                </div>
                <div class="form-group">
                    <label>启动命令</label>
                    <input type="text" class="form-control" id="inputStartCmd" placeholder="例如 python main.py">
                </div>
                <div class="form-group">
                    <label>日志标识 (SYS_STD_FILE_NAME)</label>
                    <input type="text" class="form-control" id="inputSysStd" placeholder="留空则使用部署名称">
                </div>
                <div class="form-group">
                    <label>环境变量</label>
                    <div id="envVarsContainer"></div>
                    <button class="btn-env-add" onclick="addEnvRow()"><i class="fa fa-plus"></i> 添加环境变量</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveDeploy()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title"><i class="fa fa-exclamation-triangle" style="color:#ef4444;margin-right:8px;"></i>确认删除</h4>
            </div>
            <div class="modal-body">确定要删除部署 <strong id="deleteTargetName"></strong> 吗？此操作不可恢复。</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>
</div>

<script>
var refreshTimer = null;
var deleteTarget = '';

function loadDeployList() {
    $.get('/deploy/list', function(resp) {
        if (!resp.succ) return;
        $('#localIp').text(resp.ip);
        var list = resp.data;
        $('#deployCount').text(list.length);
        var runCount = 0;
        list.forEach(function(d) { if (d.running) runCount++; });
        $('#runningCount').text(runCount);

        if (list.length === 0) {
            $('#deployTableBody').html(
                '<tr><td colspan="7" class="empty-state"><i class="fa fa-inbox"></i>暂无部署，点击右上角"新建部署"开始</td></tr>'
            );
            return;
        }

        var html = '';
        list.forEach(function(d) {
            var statusHtml = d.running
                ? '<span class="status-dot status-running"></span>运行中'
                : '<span class="status-dot status-stopped"></span>已停止';
            var actionsHtml = '<button class="btn-action btn-detail" onclick="goDetail(\'' + d.name + '\')"><i class="fa fa-eye"></i> 详情</button>';
            if (d.running) {
                actionsHtml += '<button class="btn-action btn-stop-sm" onclick="quickStop(\'' + d.name + '\')"><i class="fa fa-stop"></i> 停止</button>';
            } else {
                actionsHtml += '<button class="btn-action btn-start-sm" onclick="quickStart(\'' + d.name + '\')"><i class="fa fa-play"></i> 启动</button>';
            }
            actionsHtml += '<button class="btn-action btn-del" onclick="showDeleteModal(\'' + d.name + '\')"><i class="fa fa-trash"></i></button>';

            html += '<tr>' +
                '<td><strong>' + d.name + '</strong></td>' +
                '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (d.project_dir||'') + '">' + (d.project_dir||'-') + '</td>' +
                '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (d.start_cmd||'') + '">' + (d.start_cmd||'-') + '</td>' +
                '<td>' + statusHtml + '</td>' +
                '<td>' + (d.start_time||'-') + '</td>' +
                '<td>' + (d.pid||'-') + '</td>' +
                '<td>' + actionsHtml + '</td>' +
                '</tr>';
        });
        $('#deployTableBody').html(html);
    });
}

function goDetail(name) {
    window.location.href = '/tpl/deploy_detail.html?name=' + encodeURIComponent(name);
}

function showCreateModal() {
    $('#editMode').val('create');
    $('#createModalTitle').html('<i class="fa fa-plus-circle" style="color:#6366f1;margin-right:8px;"></i>新建部署');
    $('#inputName').val('').prop('disabled', false);
    $('#inputProjectDir').val('');
    $('#inputStartCmd').val('');
    $('#inputSysStd').val('');
    $('#envVarsContainer').empty();
    $('#createModal').modal('show');
}

function showEditModal(name) {
    $.get('/deploy/' + encodeURIComponent(name) + '/config', function(resp) {
        if (!resp.succ) { alert(resp.msg); return; }
        var d = resp.data;
        $('#editMode').val('edit');
        $('#createModalTitle').html('<i class="fa fa-edit" style="color:#6366f1;margin-right:8px;"></i>编辑部署');
        $('#inputName').val(d.name).prop('disabled', true);
        $('#inputProjectDir').val(d.project_dir || '');
        $('#inputStartCmd').val(d.start_cmd || '');
        $('#inputSysStd').val(d.sys_std_file_name || '');
        $('#envVarsContainer').empty();
        try {
            var envObj = JSON.parse(d.env_vars || '{}');
            for (var k in envObj) { addEnvRow(k, envObj[k]); }
        } catch(e) {}
        $('#createModal').modal('show');
    });
}

function addEnvRow(key, val) {
    var html = '<div class="env-row">' +
        '<input type="text" class="form-control env-key" placeholder="KEY" value="' + (key||'') + '">' +
        '<input type="text" class="form-control env-val" placeholder="VALUE" value="' + (val||'') + '">' +
        '<button class="btn-env-remove" onclick="$(this).parent().remove()"><i class="fa fa-times"></i></button>' +
        '</div>';
    $('#envVarsContainer').append(html);
}

function collectEnvVars() {
    var env = {};
    $('#envVarsContainer .env-row').each(function() {
        var k = $(this).find('.env-key').val().trim();
        var v = $(this).find('.env-val').val().trim();
        if (k) env[k] = v;
    });
    return env;
}

function saveDeploy() {
    var name = $('#inputName').val().trim();
    if (!name) { alert('部署名称不能为空'); return; }
    var payload = {
        name: name,
        project_dir: $('#inputProjectDir').val().trim(),
        start_cmd: $('#inputStartCmd').val().trim(),
        sys_std_file_name: $('#inputSysStd').val().trim(),
        env_vars: collectEnvVars()
    };
    $.ajax({
        url: '/deploy/save',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function(resp) {
            if (resp.succ) {
                $('#createModal').modal('hide');
                loadDeployList();
            } else {
                alert(resp.msg);
            }
        }
    });
}

function quickStart(name) {
    $.post('/deploy/' + encodeURIComponent(name) + '/start', function(resp) {
        alert(resp.msg);
        loadDeployList();
    });
}

function quickStop(name) {
    $.post('/deploy/' + encodeURIComponent(name) + '/stop', function(resp) {
        alert(resp.msg);
        loadDeployList();
    });
}

function showDeleteModal(name) {
    deleteTarget = name;
    $('#deleteTargetName').text(name);
    $('#deleteModal').modal('show');
}

function confirmDelete() {
    $.ajax({
        url: '/deploy/' + encodeURIComponent(deleteTarget) + '/delete',
        method: 'DELETE',
        success: function(resp) {
            $('#deleteModal').modal('hide');
            if (resp.succ) { loadDeployList(); }
            else { alert(resp.msg); }
        }
    });
}

$(document).ready(function() {
    loadDeployList();
    refreshTimer = setInterval(loadDeployList, 5000);
});
</script>
</body>
</html>
