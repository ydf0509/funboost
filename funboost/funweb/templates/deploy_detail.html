<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部署详情</title>
    <link href="{{ url_for('static',filename='css_cdn/twitter-bootstrap/3.3.7/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static',filename='css_cdn/font-awesome/4.7.0/css/font-awesome.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static',filename='css_cdn/select2/4.0.13/css/select2.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static',filename='js/jquery-1.11.0.min.js') }}"></script>
    <script src="{{ url_for('static',filename='js_cdn/bootstrap/3.3.7/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static',filename='js/select2.min.js') }}"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e0e0e0; margin: 0; padding: 0;
        }
        .main-container { padding: 20px 25px; max-width: 100%; }

        .top-bar {
            display: flex; align-items: center; gap: 15px;
            margin-bottom: 20px; padding: 14px 20px;
            background: linear-gradient(135deg, rgba(30,30,63,0.9) 0%, rgba(42,42,74,0.85) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2);
        }
        .btn-back {
            background: rgba(99,102,241,0.2); color: #a78bfa; border: none;
            border-radius: 8px; padding: 6px 14px; cursor: pointer;
            font-size: 13px; transition: all .3s ease;
        }
        .btn-back:hover { background: rgba(99,102,241,0.4); color: #fff; }
        .top-bar h3 { margin: 0; color: #fff; font-weight: 700; flex: 1; }
        .top-bar .status-badge {
            padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .badge-running { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .badge-stopped { background: rgba(107,114,128,0.2); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }

        .card {
            background: linear-gradient(135deg, rgba(30,30,63,0.85) 0%, rgba(42,42,74,0.8) 100%);
            border-radius: 14px; border: 1px solid rgba(99,102,241,0.2);
            margin-bottom: 18px; overflow: hidden;
        }
        .card-header {
            padding: 14px 20px; border-bottom: 1px solid rgba(99,102,241,0.15);
            display: flex; align-items: center; gap: 10px;
            font-weight: 600; font-size: 15px; color: #fff;
        }
        .card-header i { color: #a78bfa; }
        .card-body { padding: 18px 20px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { color: #a78bfa; font-weight: 600; font-size: 13px; margin-bottom: 4px; display: block; }
        .form-control {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 8px 12px; width: 100%;
        }
        .form-control:focus {
            border-color: #6366f1; outline: none;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
            background: rgba(15,12,41,0.8); color: #fff;
        }
        .form-control:disabled, .form-control[disabled] {
            background: rgba(99,102,241,0.15) !important; color: #e0e0e0 !important;
            border-color: rgba(99,102,241,0.3) !important; opacity: 1 !important;
            -webkit-text-fill-color: #e0e0e0 !important;
        }
        .deploy-name-input {
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            font-weight: 600 !important;
        }

        .cmd-detail-box {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(99,102,241,0.2);
            border-radius: 8px; padding: 12px; margin-top: 10px;
            font-family: 'Consolas','Courier New',monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; color: #a78bfa;
            max-height: 300px; overflow-y: auto; display: none;
        }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }

        .env-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .env-row input { flex: 1; }
        .btn-env-remove {
            background: rgba(239,68,68,0.2); color: #f87171; border: none;
            border-radius: 6px; width: 30px; height: 30px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-env-add {
            background: rgba(16,185,129,0.2); color: #34d399; border: none;
            border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px;
            margin-top: 4px;
        }
        .btn-save-config {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none; color: #fff; padding: 8px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all .3s ease; margin-top: 8px;
        }
        .btn-save-config:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }

        .process-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn-ctrl {
            padding: 8px 20px; border-radius: 8px; font-size: 13px;
            border: none; cursor: pointer; font-weight: 600;
            transition: all .3s ease; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-ctrl:hover { transform: translateY(-2px); }
        .btn-ctrl:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-start { background: linear-gradient(135deg, #059669 0%, #34d399 100%); color: #fff; }
        .btn-start:hover { box-shadow: 0 6px 20px rgba(5,150,105,0.4); }
        .btn-stop { background: linear-gradient(135deg, #dc2626 0%, #f87171 100%); color: #fff; }
        .btn-stop:hover { box-shadow: 0 6px 20px rgba(220,38,38,0.4); }
        .btn-restart { background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%); color: #fff; }
        .btn-restart:hover { box-shadow: 0 6px 20px rgba(217,119,6,0.4); }
        .btn-update-restart-ctrl { background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%); color: #fff; }
        .btn-update-restart-ctrl:hover { box-shadow: 0 6px 20px rgba(109,40,217,0.4); }
        .process-info { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .process-info-item { font-size: 13px; }
        .process-info-item .label { color: rgba(255,255,255,0.5); margin-right: 6px; }
        .process-info-item .value { color: #fff; font-weight: 600; }
        .poll-ctrl {
            margin-left: auto; display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: rgba(255,255,255,0.5);
        }
        .poll-ctrl select {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 6px; padding: 2px 6px; font-size: 12px;
        }
        .poll-ctrl select:focus { border-color: #6366f1; outline: none; }

        .btn-git {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            border: none; color: #fff; padding: 8px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all .3s ease; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-git:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        .git-output {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(99,102,241,0.15);
            border-radius: 8px; padding: 12px; margin-top: 12px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 13px;
            max-height: 200px; overflow-y: auto; white-space: pre-wrap; display: none;
        }
        .git-success { border-color: rgba(16,185,129,0.3); color: #34d399; }
        .git-fail { border-color: rgba(239,68,68,0.3); color: #f87171; }
        .git-branch-bar {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px;
        }
        .git-branch-bar select {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 6px 10px; font-size: 13px; min-width: 200px;
        }
        .git-branch-bar select:focus { border-color: #6366f1; outline: none; }
        /* select2 深色主题覆盖 */
        .select2-container--default .select2-selection--single {
            background: rgba(15,12,41,0.8); border: 1px solid rgba(99,102,241,0.3);
            border-radius: 8px; height: 34px; min-width: 220px;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #e0e0e0; line-height: 32px; padding-left: 10px;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 32px;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow b {
            border-color: #a78bfa transparent transparent transparent;
        }
        .select2-dropdown {
            background: #1e1e3f; border: 1px solid rgba(99,102,241,0.4); border-radius: 8px;
        }
        .select2-search--dropdown .select2-search__field {
            background: rgba(15,12,41,0.8); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 6px; padding: 4px 8px;
        }
        .select2-results__option { color: #e0e0e0; padding: 6px 12px; }
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background: rgba(99,102,241,0.4); color: #fff;
        }
        .select2-results__option[aria-selected=true] { background: rgba(99,102,241,0.2); color: #a78bfa; }
        .btn-git-sm {
            background: rgba(99,102,241,0.2); color: #a78bfa; border: none;
            border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px;
            transition: all .2s ease;
        }
        .btn-git-sm:hover { background: rgba(99,102,241,0.4); color: #fff; }

        .log-toolbar {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;
        }
        .log-toolbar input, .log-toolbar select {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 6px 10px; font-size: 13px;
        }
        .log-toolbar input:focus, .log-toolbar select:focus {
            border-color: #6366f1; outline: none;
        }
        .log-search { min-width: 180px; flex: 1; }
        .log-toolbar-label { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
        .btn-log {
            background: rgba(99,102,241,0.2); color: #a78bfa; border: none;
            border-radius: 8px; padding: 6px 14px; cursor: pointer;
            font-size: 13px; transition: all .2s ease; white-space: nowrap;
        }
        .btn-log:hover { background: rgba(99,102,241,0.4); color: #fff; }
        .btn-log.active { background: linear-gradient(135deg, #10b981, #059669) !important; border-color: #10b981 !important; color: #fff !important; font-weight: 600; box-shadow: 0 0 10px rgba(16,185,129,0.35); }

        .log-time-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .log-time-row input[type="datetime-local"] {
            background: rgba(15,12,41,0.6); border: 1px solid rgba(99,102,241,0.3);
            color: #e0e0e0; border-radius: 8px; padding: 5px 8px; font-size: 12px;
        }
        .log-time-row input[type="datetime-local"]:focus { border-color: #6366f1; outline: none; }

        .log-quick-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-quick {
            background: rgba(99,102,241,0.12); color: #a78bfa; border: 1px solid rgba(99,102,241,0.2);
            border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px;
            transition: all .2s ease;
        }
        .btn-quick:hover { background: rgba(99,102,241,0.3); color: #fff; border-color: rgba(99,102,241,0.4); }
        .btn-quick.active { background: linear-gradient(135deg, #10b981, #059669) !important; border-color: #10b981 !important; color: #fff !important; font-weight: 600; box-shadow: 0 0 10px rgba(16,185,129,0.35); }

        .log-viewer {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(99,102,241,0.15);
            border-radius: 10px; padding: 14px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 12.5px;
            line-height: 1.6; max-height: 600px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
        }
        .log-viewer .log-line { padding: 1px 0; }
        .log-line-print    { color: #3b82f6; }
        .log-line-debug    { color: #10b981; }
        .log-line-info     { color: #06b6d4; }
        .log-line-warning  { color: #f59e0b; }
        .log-line-error    { color: #ec4899; }
        .log-line-critical { color: #ef4444; font-weight: 600; }
        .log-line-highlight { background: rgba(251,191,36,0.2); border-radius: 3px; }
        .log-meta {
            display: flex; gap: 15px; margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.4);
        }

        /* 操作弹框实时日志样式 */
        .modal-content {
            background: linear-gradient(135deg, #1e1e3f 0%, #2a2a4a 100%);
            border: 1px solid rgba(99,102,241,0.3); border-radius: 16px; color: #e0e0e0;
        }
        .modal-header { border-bottom: 1px solid rgba(99,102,241,0.2); padding: 20px; }
        .modal-title { color: #fff; font-weight: 600; }
        .modal-footer { border-top: 1px solid rgba(99,102,241,0.2); padding: 15px 20px; }
        .close { color: #a78bfa; opacity: 1; font-size: 24px; }
        .close:hover { color: #fff; }
        .modal-footer .btn-default { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .cmd-modal-box {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(99,102,241,0.2);
            border-radius: 8px; padding: 14px;
            font-family: 'Consolas','Courier New',monospace; font-size: 12px;
            max-height: 500px; overflow-y: auto;
        }
        .ur-line { padding: 2px 0; font-size: 13px; line-height: 1.6; }
        .ur-step { color: #a78bfa; font-weight: 700; margin-top: 10px; margin-bottom: 4px; border-bottom: 1px solid rgba(99,102,241,0.2); padding-bottom: 4px; }
        .ur-step:first-child { margin-top: 0; }
        .ur-cmd { color: #60a5fa; }
        .ur-loading { color: rgba(255,255,255,0.5); padding: 4px 0; }
        .ur-success { color: #34d399; white-space: pre-wrap; }
        .ur-error { color: #f87171; white-space: pre-wrap; }
        .ur-ok { color: #34d399; font-weight: 600; margin-top: 6px; padding: 4px 8px; background: rgba(52,211,153,0.1); border-radius: 4px; }
        .ur-fail { color: #f87171; font-weight: 600; margin-top: 6px; padding: 4px 8px; background: rgba(248,113,113,0.1); border-radius: 4px; }
        .ur-info { color: #e0e0e0; }
        .ur-log  { color: #94a3b8; font-size: 11.5px; }
        .ur-warn { color: #fbbf24; font-size: 11.5px; }
        .ur-critical { color: #dc2626; font-weight: 600; font-size: 11.5px; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="top-bar">
        <button class="btn-back" onclick="goBack()"><i class="fa fa-arrow-left"></i> 返回列表</button>
        <h3 id="deployTitle">部署详情</h3>
        <span class="status-badge badge-stopped" id="statusBadge"><i class="fa fa-circle"></i> 已停止</span>
    </div>

    <!-- 基本配置 -->
    <div class="card">
        <div class="card-header"><i class="fa fa-cog"></i> 基本配置</div>
        <div class="card-body">
            <div class="form-group">
                <label>部署名称</label>
                <input type="text" class="form-control deploy-name-input" id="cfgName" disabled>
            </div>
            <div class="form-group">
                <label>项目说明 <small style="font-weight:normal;color:rgba(255,255,255,0.45);">（可选）</small></label>
                <textarea class="form-control" id="cfgDescription" rows="2" placeholder="描述该部署的用途，可填写多行" style="resize:vertical;"></textarea>
            </div>
            <div class="form-group">
                <label>项目根目录</label>
                <input type="text" class="form-control" id="cfgProjectDir" placeholder="本地绝对路径">
            </div>
            <div class="form-group">
                <label>启动命令</label>
                <input type="text" class="form-control" id="cfgStartCmd" placeholder="例如 python main.py">
            </div>
            <div class="form-group">
                <label>环境变量</label>
                <div id="cfgEnvVars"></div>
                <button class="btn-env-add" onclick="addEnvRow()"><i class="fa fa-plus"></i> 添加</button>
            </div>
            <hr style="border-color:rgba(99,102,241,0.15);margin:15px 0;">
            <div style="font-size:13px;color:#a78bfa;font-weight:600;margin-bottom:10px;">高级设置</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#e0e0e0;">
                    <input type="checkbox" id="cfgAutoStart"> 自动启动 (服务启动时)
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#e0e0e0;">
                    <input type="checkbox" id="cfgAutoRestart"> 自动重启 (崩溃后)
                </label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <label style="font-size:13px;color:#a78bfa;margin:0;">最大重试:</label>
                    <input type="number" class="form-control" id="cfgMaxRetry" value="3" min="1" max="100" style="width:70px;padding:4px 8px;">
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
                    <label style="font-size:13px;color:#a78bfa;margin:0;">存活检查(秒):</label>
                    <input type="number" class="form-control" id="cfgHealthSecs" value="10" min="1" max="300" style="width:70px;padding:4px 8px;">
                </div>
                <div style="display:flex;align-items:center;gap:6px;">
                    <label style="font-size:13px;color:#a78bfa;margin:0;">进程数量:</label>
                    <input type="number" class="form-control" id="cfgNumProcesses" value="1" min="1" max="100" style="width:70px;padding:4px 8px;">
                </div>
            </div>
            <button class="btn-save-config" onclick="saveConfig()" style="margin-top:14px;"><i class="fa fa-save"></i> 保存配置</button>
        </div>
    </div>

    <!-- Git 操作 -->
    <div class="card" id="gitCard" style="display:none;">
        <div class="card-header"><i class="fa fa-git"></i> Git 操作</div>
        <div class="card-body">
            <div class="git-branch-bar">
                <span class="log-toolbar-label">当前分支:</span>
                <strong id="gitCurrentBranch" style="color:#34d399;">-</strong>
                <span class="log-toolbar-label" style="margin-left:20px;">切换分支:</span>
                <select id="gitBranchSelect">
                    <option value="">-- 保持当前分支 --</option>
                </select>
                <button class="btn-git-sm" onclick="loadGitBranches()" title="刷新分支列表"><i class="fa fa-refresh"></i></button>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="btn-git" id="btnGitPull" onclick="doGitPull()"><i class="fa fa-download"></i> Git Pull</button>
            </div>
            <div class="git-output" id="gitOutput"></div>
        </div>
    </div>

    <!-- 进程控制 -->
    <div class="card">
        <div class="card-header"><i class="fa fa-play-circle"></i> 进程控制</div>
        <div class="card-body">
            <div class="process-controls">
                <button class="btn-ctrl btn-start" id="btnStart" onclick="doStart()"><i class="fa fa-play"></i> 启动</button>
                <button class="btn-ctrl btn-stop" id="btnStop" onclick="doStop()" disabled><i class="fa fa-stop"></i> 停止</button>
                <button class="btn-ctrl btn-restart" id="btnRestart" onclick="doRestart()"><i class="fa fa-refresh"></i> 重启</button>
                <button class="btn-ctrl btn-update-restart-ctrl" id="btnUpdateRestart" onclick="doUpdateRestart()"><i class="fa fa-cloud-download"></i> 更新重启</button>
                <span class="poll-ctrl">
                    <i class="fa fa-clock-o"></i> 状态轮询:
                    <select id="statusInterval" onchange="updateStatusInterval()">
                        <option value="0">关闭</option>
                        <option value="60" selected>60秒</option>
                        <option value="300">300秒</option>
                    </select>
                </span>
            </div>
            <div class="process-info">
                <div class="process-info-item"><span class="label">PID:</span><span class="value" id="infoPid">-</span></div>
                <div class="process-info-item"><span class="label">启动时间:</span><span class="value" id="infoStartTime">-</span></div>
                <div class="process-info-item"><span class="label">搜索命令:</span><span class="value" id="infoSearchCmd" style="font-size:11px;color:#6b7280;">-</span></div>
            </div>
            <div class="cmd-detail-box" id="processCmd"></div>
        </div>
    </div>

    <!-- 日志查看 -->
    <div class="card">
        <div class="card-header"><i class="fa fa-file-text-o"></i> 日志查看</div>
        <div class="card-body">
            <div class="log-quick-btns">
                <button class="btn-quick" data-range="1m">近1分钟</button>
                <button class="btn-quick" data-range="5m">近5分钟</button>
                <button class="btn-quick" data-range="1h">近1小时</button>
                <button class="btn-quick" data-range="6h">近6小时</button>
                <button class="btn-quick" data-range="1d">近1天</button>
                <button class="btn-quick" data-range="3d">近3天</button>
                <button class="btn-quick" data-range="7d">近7天</button>

<div class="modal fade" id="cmdModal" tabindex="-1" data-backdrop="static" data-keyboard="false">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header">

            <h4 class="modal-title" id="cmdModalTitle"><i class="fa fa-terminal" style="color:#a78bfa;margin-right:8px;"></i>执行详情</h4>
        </div>
        <div class="modal-body"><div class="cmd-modal-box" id="cmdModalContent"></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-default" data-dismiss="modal">关闭</button></div>
    </div></div>

<script>
var deployName = '';
var statusTimer = null;
var currentTimeRange = 'all';
var deployLogES = null;
var deployLogStreaming = false;
var deployStreamAutoStopTimer = null;
/** 与后端 log_stream_limits.LOG_STREAM_MAX_SECONDS 一致（秒×1000） */
var LOG_STREAM_MAX_MS = 300 * 1000;
var LOG_STREAM_MAX_MIN = Math.max(1, Math.floor(LOG_STREAM_MAX_MS / 60000));
var deployLogLastCls = 'log-line';

function getUrlParam(key) {
    var params = new URLSearchParams(window.location.search);
    return params.get(key) || '';
}

function goBack() {
    if (window.parent && window.parent.navigateTo) {
        window.parent.navigateTo('/tpl/deploy_list.html');
    } else {
        window.location.href = '/tpl/deploy_list.html';
    }
}

function addEnvRow(key, val) {
    var html = '<div class="env-row">' +
        '<input type="text" class="form-control env-key" placeholder="KEY" value="' + (key||'') + '">' +
        '<input type="text" class="form-control env-val" placeholder="VALUE" value="' + (val||'') + '">' +
        '<button class="btn-env-remove" onclick="$(this).parent().remove()"><i class="fa fa-times"></i></button>' +
        '</div>';
    $('#cfgEnvVars').append(html);
}

function collectEnvVars() {
    var env = {};
    $('#cfgEnvVars .env-row').each(function() {
        var k = $(this).find('.env-key').val().trim();
        var v = $(this).find('.env-val').val().trim();
        if (k) env[k] = v;
    });
    return env;
}

function loadConfig() {
    $.get('/deploy/' + encodeURIComponent(deployName) + '/config', function(resp) {
        if (!resp.succ) { alert(resp.msg); return; }
        var d = resp.data;
        $('#deployTitle').text('部署详情 - ' + d.name);
        $('#cfgName').val(d.name);
        $('#cfgDescription').val(d.description || '');
        $('#cfgProjectDir').val(d.project_dir || '');
        $('#cfgStartCmd').val(d.start_cmd || '');
        $('#cfgEnvVars').empty();
        try {
            var envObj = JSON.parse(d.env_vars || '{}');
            for (var k in envObj) { addEnvRow(k, envObj[k]); }
        } catch(e) {}
        $('#cfgAutoStart').prop('checked', d.auto_start === '1');
        $('#cfgAutoRestart').prop('checked', d.auto_restart === '1');
        $('#cfgMaxRetry').val(d.max_retry || 3);
        $('#cfgHealthSecs').val(d.health_check_secs || 10);
        $('#cfgNumProcesses').val(d.num_processes || 1);
        updateStatusUI(d);
    });
}

function saveConfig() {
    var payload = {
        name: deployName,
        description: $('#cfgDescription').val().trim(),
        project_dir: $('#cfgProjectDir').val().trim(),
        start_cmd: $('#cfgStartCmd').val().trim(),
        env_vars: collectEnvVars(),
        auto_start: $('#cfgAutoStart').is(':checked'),
        auto_restart: $('#cfgAutoRestart').is(':checked'),
        max_retry: parseInt($('#cfgMaxRetry').val()) || 3,
        health_check_secs: parseInt($('#cfgHealthSecs').val()) || 10,
        num_processes: parseInt($('#cfgNumProcesses').val()) || 1
    };
    $.ajax({
        url: '/deploy/save',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function(resp) { alert(resp.msg); }
    });
}

function updateStatusUI(d) {
    var running = d.running;
    $('#infoPid').text(d.pid || '-');
    $('#infoStartTime').text(d.start_time || '-');
    $('#infoSearchCmd').text(d.search_cmd || '-');
    if (running) {
        $('#statusBadge').removeClass('badge-stopped').addClass('badge-running')
            .html('<i class="fa fa-circle"></i> 运行中');
        $('#btnStart').prop('disabled', true);
        $('#btnStop').prop('disabled', false);
    } else {
        $('#statusBadge').removeClass('badge-running').addClass('badge-stopped')
            .html('<i class="fa fa-circle"></i> 已停止');
        $('#btnStart').prop('disabled', false);
        $('#btnStop').prop('disabled', true);
    }
}

function pollStatus() {
    $.get('/deploy/' + encodeURIComponent(deployName) + '/status', function(resp) {
        if (resp.succ) updateStatusUI(resp.data);
    });
}

function updateStatusInterval() {
    clearInterval(statusTimer);
    var sec = parseInt($('#statusInterval').val()) || 0;
    if (sec > 0) {
        statusTimer = setInterval(pollStatus, sec * 1000);
    }
}

function urLog($el, text, type) {
    var cls = 'ur-line';
    switch(type) {
        case 'step': cls += ' ur-step'; break;
        case 'cmd': cls += ' ur-cmd'; break;
        case 'loading': cls += ' ur-loading'; break;
        case 'success': cls += ' ur-success'; break;
        case 'error': cls += ' ur-error'; break;
        case 'ok': cls += ' ur-ok'; break;
        case 'fail': cls += ' ur-fail'; break;
        case 'info': cls += ' ur-info'; break;
    }
    var $div = $('<div>').addClass(cls);
    if (type === 'loading') { $div.html(text); } else { $div.text(text); }
    $el.append($div);
    $el[0].scrollTop = $el[0].scrollHeight;
}

function appendLogTail($c, name) {
    urLog($c, '── 近期日志（最新200行）──', 'step');
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>加载日志中...', 'loading');
    $.get('/deploy/' + encodeURIComponent(name) + '/logs', { lines: 200 }, function(resp) {
        $c.find('.ur-loading:last').remove();
        if (!resp.succ || !resp.data || resp.data.length === 0) {
            urLog($c, '（暂无日志）', 'info');
            return;
        }
        var lines = resp.data;
        var lastCls = 'ur-info';
        for (var i = 0; i < lines.length; i++) {
            var raw = lines[i];
            if (!raw.trim()) continue;
            var hasTs = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/.test(raw);
            var cls;
            if (hasTs) {
                if (/- CRITICAL -/.test(raw))      cls = 'ur-critical';
                else if (/- ERROR -/.test(raw) || /\bTraceback\b/.test(raw)) cls = 'ur-error';
                else if (/- WARNING -/.test(raw))  cls = 'ur-warn';
                else                               cls = 'ur-log';
                lastCls = cls;
            } else {
                cls = lastCls;
            }
            var $d = $('<div>').addClass('ur-line ' + cls).text(raw);
            $c.append($d);
        }
        $c[0].scrollTop = $c[0].scrollHeight;
    });
}

function renderStartDetail($c, d) {
    if (d.cwd) urLog($c, '工作目录: ' + d.cwd, 'info');
    if (d.env_vars && d.env_vars.length) {
        urLog($c, '环境变量:', 'info');
        d.env_vars.forEach(function(v) { urLog($c, '  ' + v, 'info'); });
    }
    if (d.num_processes && d.num_processes > 1) urLog($c, '进程数量: ' + d.num_processes, 'info');
    if (d.full_cmd) urLog($c, '启动命令: ' + d.full_cmd, 'cmd');
    if (d.log_file) urLog($c, '日志文件: ' + d.log_file, 'info');
    if (d.start_time) urLog($c, '启动时间: ' + d.start_time, 'info');
    if (d.pid) urLog($c, 'PID: ' + d.pid, 'info');
    if (d.survived_secs != null && d.survived_secs >= 0) urLog($c, '存活验证: 稳定运行 ' + d.survived_secs + ' 秒 ✓', 'info');
}

function doStart() {
    $('#cmdModalTitle').html('<i class="fa fa-play" style="color:#34d399;margin-right:8px;"></i>启动 - ' + deployName);
    var $c = $('#cmdModalContent').html('');
    $('#cmdModal').modal('show');
    urLog($c, '启动进程', 'step');
    var hSecs = parseInt($('#cfgHealthSecs').val()) || 10;
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在启动，并等待存活验证（最长 ' + hSecs + ' 秒）...', 'loading');
    $('#btnStart').prop('disabled', true);
    $.ajax({
        url: '/deploy/' + encodeURIComponent(deployName) + '/start',
        method: 'POST',
        timeout: (hSecs + 15) * 1000,
        success: function(resp) {
            $c.find('.ur-loading:last').remove();
            if (resp.cmd_detail) renderStartDetail($c, resp.cmd_detail);
            if (!resp.succ && resp.msg) urLog($c, resp.msg, 'error');
            urLog($c, resp.succ ? ('\u2713 ' + resp.msg) : ('\u2717 启动失败'), resp.succ ? 'ok' : 'fail');
            appendLogTail($c, deployName);
            setTimeout(pollStatus, 2000);
            if (!resp.succ) $('#btnStart').prop('disabled', false);
        },
        error: function() {
            $c.find('.ur-loading:last').remove();
            urLog($c, '请求失败或超时', 'error');
            $('#btnStart').prop('disabled', false);
        }
    });
}

function doStop() {
    $('#cmdModalTitle').html('<i class="fa fa-stop" style="color:#f87171;margin-right:8px;"></i>停止 - ' + deployName);
    var $c = $('#cmdModalContent').html('');
    $('#cmdModal').modal('show');
    urLog($c, '停止进程', 'step');
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在停止...', 'loading');
    $('#btnStop').prop('disabled', true);
    $.post('/deploy/' + encodeURIComponent(deployName) + '/stop', function(resp) {
        $c.find('.ur-loading:last').remove();
        if (resp.cmd_detail) {
            var d = resp.cmd_detail;
            if (d.search_cmd) urLog($c, '搜索命令: ' + d.search_cmd, 'cmd');
            if (d.found_pids && d.found_pids.length) urLog($c, '找到进程 PID: ' + d.found_pids.join(', '), 'info');
            if (d.old_start_time) urLog($c, '旧启动时间: ' + d.old_start_time, 'info');
            if (d.kill_cmds && d.kill_cmds.length) { d.kill_cmds.forEach(function(c) { urLog($c, '执行: ' + c, 'cmd'); }); }
        }
        urLog($c, resp.succ ? ('\u2713 ' + resp.msg) : ('\u2717 ' + resp.msg), resp.succ ? 'ok' : 'fail');
        setTimeout(pollStatus, 2000);
    });
}

function doRestart() {
    $('#cmdModalTitle').html('<i class="fa fa-refresh" style="color:#fbbf24;margin-right:8px;"></i>重启 - ' + deployName);
    var $c = $('#cmdModalContent').html('');
    $('#cmdModal').modal('show');
    urLog($c, '重启进程', 'step');
    var hSecs = parseInt($('#cfgHealthSecs').val()) || 10;
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在停止旧进程并启动新进程，等待存活验证（最长 ' + hSecs + ' 秒）...', 'loading');
    $('#btnRestart').prop('disabled', true);
    $.ajax({
        url: '/deploy/' + encodeURIComponent(deployName) + '/restart',
        method: 'POST',
        timeout: (hSecs + 15) * 1000,
        success: function(resp) {
            $c.find('.ur-loading:last').remove();
            if (resp.cmd_detail) {
                var d = resp.cmd_detail;
                if (d.search_cmd) urLog($c, '搜索命令: ' + d.search_cmd, 'cmd');
                if (d.found_pids && d.found_pids.length) urLog($c, '找到旧进程 PID: ' + d.found_pids.join(', '), 'info');
                if (d.old_start_time) urLog($c, '旧启动时间: ' + d.old_start_time, 'info');
                if (d.kill_details && d.kill_details.length) { d.kill_details.forEach(function(k) { urLog($c, '杀死 PID ' + k.pid + ': ' + k.cmd + (k.ok ? ' ✓' : ' ✗'), k.ok ? 'cmd' : 'error'); }); }
                if (d.cwd) urLog($c, '工作目录: ' + d.cwd, 'info');
                if (d.env_vars && d.env_vars.length) {
                    urLog($c, '环境变量:', 'info');
                    d.env_vars.forEach(function(v) { urLog($c, '  ' + v, 'info'); });
                }
                if (d.full_cmd) urLog($c, '启动命令: ' + d.full_cmd, 'cmd');
                if (d.log_file) urLog($c, '日志文件: ' + d.log_file, 'info');
                if (d.start_time) urLog($c, '启动时间: ' + d.start_time, 'info');
                if (d.pid) urLog($c, '新 PID: ' + d.pid, 'info');
                if (d.survived_secs != null && d.survived_secs >= 0) urLog($c, '存活验证: 稳定运行 ' + d.survived_secs + ' 秒 ✓', 'info');
            }
            if (!resp.succ && resp.msg) urLog($c, resp.msg, 'error');
            urLog($c, resp.succ ? ('\u2713 ' + resp.msg) : ('\u2717 启动失败'), resp.succ ? 'ok' : 'fail');
            appendLogTail($c, deployName);
            $('#btnRestart').prop('disabled', false);
            setTimeout(pollStatus, 2000);
        },
        error: function() {
            $c.find('.ur-loading:last').remove();
            urLog($c, '请求失败或超时', 'error');
            $('#btnRestart').prop('disabled', false);
        }
    });
}

function doUpdateRestart() {
    $('#cmdModalTitle').html('<i class="fa fa-cloud-download" style="color:#c4b5fd;margin-right:8px;"></i>更新并重启 - ' + deployName);
    var $c = $('#cmdModalContent').html('');
    $('#cmdModal').modal('show');
    $('#btnUpdateRestart').prop('disabled', true);

    urLog($c, '步骤 1/2: 执行 Git Pull', 'step');
    urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在拉取代码...', 'loading');

    var branch = $('#gitBranchSelect').val() || '';
    $.ajax({
        url: '/deploy/' + encodeURIComponent(deployName) + '/git_pull',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ branch: branch }),
        success: function(resp) {
            $c.find('.ur-loading:last').remove();
            (resp.steps || []).forEach(function(s) {
                urLog($c, s.cmd, 'cmd');
                if (s.output) urLog($c, s.output, s.ok ? 'success' : 'error');
                if (s.summary) urLog($c, s.summary, s.ok ? 'ok' : 'fail');
            });
            if (resp.msg) urLog($c, '── 总结 ── ' + resp.msg, resp.succ ? 'ok' : 'fail');

            if (!resp.succ) {
                urLog($c, '\u2717 Git 操作失败，已取消重启', 'fail');
                $('#btnUpdateRestart').prop('disabled', false);
                if (resp.current_branch) $('#gitCurrentBranch').text(resp.current_branch);
                return;
            }
            if (resp.current_branch) { $('#gitCurrentBranch').text(resp.current_branch); loadGitBranches(); }

            urLog($c, '步骤 2/2: 重启进程', 'step');
            var hSecs2 = parseInt($('#cfgHealthSecs').val()) || 10;
            urLog($c, '<i class="fa fa-spinner fa-spin" style="margin-right:6px;"></i>正在停止旧进程并启动新进程，等待存活验证（最长 ' + hSecs2 + ' 秒）...', 'loading');

            $.ajax({
                url: '/deploy/' + encodeURIComponent(deployName) + '/restart',
                method: 'POST',
                timeout: (hSecs2 + 15) * 1000,
                success: function(resp2) {
                    $c.find('.ur-loading:last').remove();
                    if (resp2.cmd_detail) {
                        var d = resp2.cmd_detail;
                        if (d.search_cmd) urLog($c, '搜索命令: ' + d.search_cmd, 'cmd');
                        if (d.found_pids && d.found_pids.length) urLog($c, '找到旧进程 PID: ' + d.found_pids.join(', '), 'info');
                        if (d.old_start_time) urLog($c, '旧启动时间: ' + d.old_start_time, 'info');
                        if (d.kill_details && d.kill_details.length) { d.kill_details.forEach(function(k) { urLog($c, '杀死 PID ' + k.pid + ': ' + k.cmd + (k.ok ? ' ✓' : ' ✗'), k.ok ? 'cmd' : 'error'); }); }
                        if (d.cwd) urLog($c, '工作目录: ' + d.cwd, 'info');
                        if (d.env_vars && d.env_vars.length) { urLog($c, '环境变量:', 'info'); d.env_vars.forEach(function(v) { urLog($c, '  ' + v, 'info'); }); }
                        if (d.full_cmd) urLog($c, '启动命令: ' + d.full_cmd, 'cmd');
                        if (d.log_file) urLog($c, '日志文件: ' + d.log_file, 'info');
                        if (d.start_time) urLog($c, '启动时间: ' + d.start_time, 'info');
                        if (d.pid) urLog($c, '新 PID: ' + d.pid, 'info');
                        if (d.survived_secs != null && d.survived_secs >= 0) urLog($c, '存活验证: 稳定运行 ' + d.survived_secs + ' 秒 ✓', 'info');
                    }
                    if (!resp2.succ && resp2.msg) urLog($c, resp2.msg, 'error');
                    urLog($c, resp2.succ ? ('\u2713 ' + resp2.msg) : ('\u2717 启动失败'), resp2.succ ? 'ok' : 'fail');
                    appendLogTail($c, deployName);
                    $('#btnUpdateRestart').prop('disabled', false);
                    setTimeout(pollStatus, 2000);
                },
                error: function() {
                    $c.find('.ur-loading:last').remove();
                    urLog($c, '重启请求失败或超时', 'error');
                    $('#btnUpdateRestart').prop('disabled', false);
                }
            });
        },
        error: function() {
            $c.find('.ur-loading:last').remove();
            urLog($c, '网络请求失败', 'error');
            urLog($c, '\u2717 操作中断', 'fail');
            $('#btnUpdateRestart').prop('disabled', false);
        }
    });
}

/* ======== Git 分支 ======== */
function loadGitBranches() {
    $.get('/deploy/' + encodeURIComponent(deployName) + '/git_branches', function(resp) {
        if (resp.is_git_repo === false) { $('#gitCard').hide(); return; }
        $('#gitCard').show();
        if (!resp.succ) return;
        $('#gitCurrentBranch').text(resp.current || '-');
        var $sel = $('#gitBranchSelect');
        $sel.empty().append('<option value="">-- 保持当前分支 --</option>');
        var localSet = {};
        (resp.local || []).forEach(function(b) {
            localSet[b] = true;
            var label = (b === resp.current) ? b + ' ★ 当前' : b;
            $sel.append('<option value="' + b + '">' + label + '</option>');
        });
        (resp.remote || []).forEach(function(b) {
            var localName = b.indexOf('/') > -1 ? b.split('/').slice(1).join('/') : b;
            if (!localSet[localName]) {
                $sel.append('<option value="' + b + '">[远程] ' + b + '</option>');
            }
        });
        // 刷新 select2
        if ($sel.data('select2')) { $sel.trigger('change'); }
    });
}

function renderGitSteps(steps, summary) {
    var lines = [];
    (steps || []).forEach(function(s) {
        lines.push(s.cmd);
        if (s.output) lines.push(s.output);
        if (s.summary) lines.push(s.summary);
        lines.push('');
    });
    if (summary) lines.push('── 总结 ──\n' + summary);
    return lines.join('\n');
}

function doGitPull() {
    var branch = $('#gitBranchSelect').val() || '';
    $('#btnGitPull').prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 拉取中...');
    $('#gitOutput').show().removeClass('git-success git-fail').text(branch ? ('切换分支: ' + branch + '\n正在执行 git pull ...') : '正在执行 git pull ...');
    $.ajax({
        url: '/deploy/' + encodeURIComponent(deployName) + '/git_pull',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ branch: branch }),
        success: function(resp) {
            $('#btnGitPull').prop('disabled', false).html('<i class="fa fa-download"></i> Git Pull');
            var cls = resp.succ ? 'git-success' : 'git-fail';
            var text = renderGitSteps(resp.steps, resp.msg);
            $('#gitOutput').removeClass('git-success git-fail').addClass(cls).text(text);
            if (resp.current_branch) $('#gitCurrentBranch').text(resp.current_branch);
            loadGitBranches();
        },
        error: function() {
            $('#btnGitPull').prop('disabled', false).html('<i class="fa fa-download"></i> Git Pull');
            $('#gitOutput').addClass('git-fail').text('请求失败');
        }
    });
}

/* ======== 日志时间范围 ======== */
function fmt(d) {
    return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0') + ':' +
        String(d.getSeconds()).padStart(2,'0');
}

var rangeMs = {
    '1m': 60000, '5m': 300000, '1h': 3600000, '6h': 21600000,
    '1d': 86400000, '3d': 259200000, '7d': 604800000, '30d': 2592000000
};

function parseDatetimeLocal(s) {
    if (!s) return null;
    var d = new Date(s);
    return isNaN(d.getTime()) ? null : d;
}

function getTimeRange() {
    if ($('#chkDeployUseTimeFilter').is(':checked')) {
        var ds = parseDatetimeLocal($('#logTimeStart').val());
        var de = parseDatetimeLocal($('#logTimeEnd').val());
        return {
            time_start: ds ? fmt(ds) : '',
            time_end: de ? fmt(de) : ''
        };
    }
    if (currentTimeRange === 'all') return { time_start: '', time_end: '' };
    var now = new Date();
    var ms = rangeMs[currentTimeRange] || 3600000;
    var start = new Date(now.getTime() - ms);
    return { time_start: fmt(start), time_end: fmt(now) };
}

function applyCustomTime() {
    $('#chkDeployUseTimeFilter').prop('checked', true);
    currentTimeRange = 'custom';
    $('.btn-quick').removeClass('active');
    refreshDeployLogsKeepStream();
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightKeyword(html, keyword) {
    if (!keyword) return html;
    var escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp('(' + escaped + ')', 'gi');
    return html.replace(re, '<span class="log-line-highlight">$1</span>');
}

function loadLogs(done) {
    var keyword = $('#logKeyword').val().trim();
    var tr = getTimeRange();
    var maxLines = parseInt($('#logLines').val()) || 200;
    var params = { lines: maxLines };
    if (keyword) params.keyword = keyword;
    if (tr.time_start) params.time_start = tr.time_start;
    if (tr.time_end) params.time_end = tr.time_end;

    $.get('/deploy/' + encodeURIComponent(deployName) + '/logs', params, function(resp) {
        if (!resp.succ) { $('#logViewer').text('加载失败'); if (typeof done === 'function') done(); return; }
        var lines = resp.data;
        $('#logFiles').text(resp.files.join(', ') || '-');
        $('#logTotal').text(resp.total);
        if (lines.length === 0) {
            $('#logViewer').html('<span style="color:rgba(255,255,255,0.3)">暂无日志</span>');
            deployLogLastCls = 'log-line';
            if (typeof done === 'function') done();
            return;
        }
        var html = '';
        var lastCls = 'log-line';
        for (var i = 0; i < lines.length; i++) {
            var line = escapeHtml(lines[i]);
            var raw = lines[i];
            var hasTimestamp = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/.test(raw);
            var cls = 'log-line';
            if (hasTimestamp) {
                if (/- CRITICAL -/.test(raw) || /\bCRITICAL\b/.test(raw))     cls += ' log-line-critical';
                else if (/- ERROR -/.test(raw) || /\bTraceback\b/.test(raw))   cls += ' log-line-error';
                else if (/- WARNING -/.test(raw))                              cls += ' log-line-warning';
                else if (/- INFO -/.test(raw))                                 cls += ' log-line-info';
                else if (/- DEBUG -/.test(raw))                                cls += ' log-line-debug';
                else if (/\[print\]/.test(raw))                                cls += ' log-line-print';
                lastCls = cls;
            } else {
                cls = lastCls;
            }
            line = highlightKeyword(line, keyword);
            html += '<div class="' + cls + '">' + line + '</div>';
        }
        deployLogLastCls = lastCls;
        $('#logViewer').html(html);
        var viewer = document.getElementById('logViewer');
        viewer.scrollTop = viewer.scrollHeight;
        if (typeof done === 'function') done();
    }).fail(function() {
        $('#logViewer').text('加载失败');
        if (typeof done === 'function') done();
    });
}

function stopDeployLogStream() {
    if (deployStreamAutoStopTimer) {
        clearTimeout(deployStreamAutoStopTimer);
        deployStreamAutoStopTimer = null;
    }
    if (deployLogES) {
        deployLogES.close();
        deployLogES = null;
    }
    deployLogStreaming = false;
    $('#btnDeployLogStream').removeClass('active').html('<i class="fa fa-play"></i> 实时');
    $('#deployStreamHint').hide();
    $('#deployStreamStatus').hide();
}

function startDeployLogStream() {
    if (!deployName) return;
    stopDeployLogStream();
    deployLogES = new EventSource('/deploy/' + encodeURIComponent(deployName) + '/logs/stream');
    deployLogStreaming = true;
    $('#btnDeployLogStream').addClass('active').html('<i class="fa fa-stop"></i> 停止实时');
    $('#deployStreamHint').text('实时中（最多 ' + LOG_STREAM_MAX_MIN + ' 分钟）').show();
    $('#deployStreamStatus').show();

    deployStreamAutoStopTimer = setTimeout(function() {
        if (deployLogStreaming) {
            stopDeployLogStream();
            alert('实时已自动关闭（' + LOG_STREAM_MAX_MIN + ' 分钟），需要请再次点击「实时」');
        }
    }, LOG_STREAM_MAX_MS);

    deployLogES.onmessage = function(e) {
        try {
            var data = JSON.parse(e.data);
            if (data.error) { stopDeployLogStream(); return; }
            if (data.event === 'timeout') {
                stopDeployLogStream();
                if (data.msg) alert(data.msg);
                return;
            }
            if (data.event === 'truncated') {
                $('#logViewer').html('<span style="color:rgba(255,255,255,0.3)">日志文件已截断，请点刷新</span>');
                deployLogLastCls = 'log-line';
                $('#logTotal').text('0');
                return;
            }
            if (data.line !== undefined) appendDeployLogLine(data.line);
        } catch (ex) {}
    };
    deployLogES.onerror = function() { stopDeployLogStream(); };
}

function toggleDeployLogStream() {
    deployLogStreaming ? stopDeployLogStream() : startDeployLogStream();
}

function refreshDeployLogsKeepStream() {
    var was = deployLogStreaming;
    stopDeployLogStream();
    loadLogs(function() {
        if (was) startDeployLogStream();
    });
}

function appendDeployLogLine(raw) {
    var keyword = $('#logKeyword').val().trim();
    if (keyword && raw.toLowerCase().indexOf(keyword.toLowerCase()) === -1) return;

    var hasTimestamp = /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/.test(raw);
    var cls = 'log-line';
    if (hasTimestamp) {
        if (/- CRITICAL -/.test(raw) || /\bCRITICAL\b/.test(raw))     cls += ' log-line-critical';
        else if (/- ERROR -/.test(raw) || /\bTraceback\b/.test(raw))   cls += ' log-line-error';
        else if (/- WARNING -/.test(raw))                              cls += ' log-line-warning';
        else if (/- INFO -/.test(raw))                                 cls += ' log-line-info';
        else if (/- DEBUG -/.test(raw))                                cls += ' log-line-debug';
        else if (/\[print\]/.test(raw))                                cls += ' log-line-print';
        deployLogLastCls = cls;
    } else {
        cls = deployLogLastCls;
    }
    var line = escapeHtml(raw);
    line = highlightKeyword(line, keyword);
    var cur = $('#logViewer');
    if (cur.find('span').length === 1 && cur.text().indexOf('暂无') >= 0) cur.empty();
    cur.append('<div class="' + cls + '">' + line + '</div>');
    var t = parseInt($('#logTotal').text(), 10);
    $('#logTotal').text((isNaN(t) ? 0 : t) + 1);
    var viewer = document.getElementById('logViewer');
    viewer.scrollTop = viewer.scrollHeight;
}

$(document).ready(function() {
    deployName = getUrlParam('name');
    if (!deployName) {
        // 尝试从 parent frame 的 URL 里读取（嵌入 iframe 时）
        try {
            var parentSearch = window.parent.location.search;
            var parentParams = new URLSearchParams(parentSearch);
            deployName = parentParams.get('name') || '';
        } catch(e) {}
    }
    if (!deployName) { alert('缺少部署名称参数'); return; }

    // 确保当前 URL 带上 name 参数，避免刷新丢失
    if (!getUrlParam('name')) {
        var newUrl = window.location.pathname + '?name=' + encodeURIComponent(deployName);
        history.replaceState(null, '', newUrl);
    }

    // 初始化 select2 分支搜索下拉
    if ($.fn.select2) {
        $('#gitBranchSelect').select2({
            placeholder: '-- 保持当前分支 --',
            allowClear: true,
            width: 'auto',
            language: { noResults: function() { return '无匹配分支'; } }
        });
    }

    // 默认填充自定义时间范围输入框（当前时间 -60分钟 ~ 当前时间），但不触发应用
    (function() {
        var now = new Date();
        var ago = new Date(now.getTime() - 3600000);
        function toLocal(d) {
            return d.getFullYear() + '-' +
                String(d.getMonth()+1).padStart(2,'0') + '-' +
                String(d.getDate()).padStart(2,'0') + 'T' +
                String(d.getHours()).padStart(2,'0') + ':' +
                String(d.getMinutes()).padStart(2,'0') + ':' +
                String(d.getSeconds()).padStart(2,'0');
        }
        $('#logTimeStart').val(toLocal(ago));
        $('#logTimeEnd').val(toLocal(now));
    })();

    loadConfig();
    loadLogs(function() { startDeployLogStream(); });
    loadGitBranches();
    updateStatusInterval();

    $('#logKeyword').on('keyup', function(e) {
        if (e.keyCode === 13) refreshDeployLogsKeepStream();
    });
    $('#logLines').on('change', function() { refreshDeployLogsKeepStream(); });

    $('.btn-quick').on('click', function() {
        $('#chkDeployUseTimeFilter').prop('checked', false);
        currentTimeRange = $(this).data('range');
        $('.btn-quick').removeClass('active');
        $(this).addClass('active');
        refreshDeployLogsKeepStream();
    });

    $('#chkDeployUseTimeFilter').on('change', function() {
        if (!this.checked) {
            $('.btn-quick').removeClass('active');
            $('.btn-quick[data-range="all"]').addClass('active');
            currentTimeRange = 'all';
            refreshDeployLogsKeepStream();
        }
    });
});
</script>
</body>
